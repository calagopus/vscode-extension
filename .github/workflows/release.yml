name: Release

on:
  push:
    branches:
      - main

env:
  PROJECT_NAME: calagopus

jobs:
  check:
    name: Check version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether this version was already released
        id: check
        run: |
          VERSION="$(jq -r '.version' package.json)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify --quiet "refs/tags/v$VERSION" >/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION already released; skipping publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New version v$VERSION detected; will publish."
          fi

  dist:
    name: Dist
    needs: [check]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: pnpm package

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-vsix
          path: dist/${{ env.PROJECT_NAME }}.vsix

  publish:
    name: Publish
    needs: [check, dist]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Download vsix artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PROJECT_NAME }}-vsix
          path: dist

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce publish --packagePath dist/${{ env.PROJECT_NAME }}.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish dist/${{ env.PROJECT_NAME }}.vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.check.outputs.version }}
          tag_name: ${{ needs.check.outputs.version }}
          generate_release_notes: true
          files: |
            dist/${{ env.PROJECT_NAME }}.vsix
